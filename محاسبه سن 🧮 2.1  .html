/*
====================
محاسبه سن شمسیاااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااااا
====================
*/

function calculateAge(){

let dateInput = document.getElementById("birthDate").value;
let calendar = document.getElementById("calendar").value;
let precise = document.getElementById("precise").checked;


if(!dateInput){
alert("تاریخ تولد را وارد کنید");
return;
}


let [y,m,d] = dateInput.split("/").map(Number);


let h = 0;
let min = 0;


if(precise && document.getElementById("birthTime").value){

[h,min] =
document.getElementById("birthTime").value
.split(":")
.map(Number);

}


let result;


if(calendar === "shamsi"){

result = calculateShamsiAge(y,m,d,h,min);

}


else if(calendar === "miladi"){

result = calculateMiladiAge(y,m,d,h,min);

}


else if(calendar === "ghamari"){

result = calculateGhamariAge(y,m,d,h,min);

}

let birthDate;


if(calendar === "miladi"){

birthDate = new Date(
    y,
    m-1,
    d,
    h,
    min
);

}


else if(calendar === "shamsi"){

let g = jalaali.toGregorian(
    y,
    m,
    d
);

birthDate = new Date(
    g.gy,
    g.gm-1,
    g.gd,
    h,
    min
);

}


else if(calendar === "ghamari"){

let g = lunarToGregorian(
    y,
    m,
    d
);

birthDate = new Date(
    g.year,
    g.month-1,
    g.day,
    h,
    min
);

}


let totalTime =
new Date() - birthDate;


let totalDays =
Math.floor(
totalTime / (1000*60*60*24)
);


let totalHours =
Math.floor(
totalTime / (1000*60*60)
);

let birthWeekDay = birthDate.getDay();

let weekdays = [
"یکشنبه",
"دوشنبه",
"سه‌شنبه",
"چهارشنبه",
"پنجشنبه",
"جمعه",
"شنبه"
];


let birthdayDay = weekdays[birthWeekDay];


let animal = chineseAnimal(y);

let nextBirthday = new Date(
    birthDate
);

nextBirthday.setFullYear(
    new Date().getFullYear()
);


let nowDate = new Date();


if(nextBirthday < nowDate){

nextBirthday.setFullYear(
    nextBirthday.getFullYear()+1
);

}


let daysToBirthday = Math.ceil(
    (nextBirthday - nowDate) /
    (1000*60*60*24)
);

document.getElementById("result").innerHTML = `

🎂 سن شما:

<br>

<b>${result.years}</b> سال

<b>${result.months}</b> ماه

<b>${result.days}</b> روز

${precise ? 
`
<br>
<b>${result.hours}</b> ساعت

<b>${result.minutes}</b> دقیقه
`
:
""}
<hr>

🌎 تعداد روزهای زندگی:

<br>

<b>${totalDays.toLocaleString()}</b>
روز


<hr>

⏰ تعداد ساعت‌های زندگی:

<br>

<b>${totalHours.toLocaleString()}</b>
ساعت

<hr>

📅 روز تولد:

<br>

<b>${birthdayDay}</b>


<hr>

🐉 حیوان سال تولد:

<br>

<b>${animal}</b>

<hr>

🎂 تا تولد بعدی:

<br>

<b>${daysToBirthday}</b>
روز مانده

`;

localStorage.setItem(
"lastAge",
document.getElementById("result").innerHTML
);

}


function showLastAge(){

let saved =
localStorage.getItem("lastAge");


if(saved){

document.getElementById("result").innerHTML =
saved;

}
else{

document.getElementById("result").innerHTML =
"❌ محاسبه قبلی ذخیره نشده است";

}

}

</script>

<script>

function lunarToGregorian(y,m,d){

// تبدیل تقریبی قمری به میلادی

let jd =
Math.floor(
(11*y+3)/30
)+
354*y+
30*m-
Math.floor((m-1)/2)+
d+
1948440-385;


let l=jd+68569;

let n=Math.floor((4*l)/146097);

l=l-Math.floor((146097*n+3)/4);

let i=Math.floor((4000*(l+1))/1461001);

l=l-Math.floor((1461*i)/4)+31;

let j=Math.floor((80*l)/2447);

let day=l-Math.floor((2447*j)/80);

l=Math.floor(j/11);

let month=j+2-12*l;

let year=100*(n-49)+i+l;


return {
year:year,
month:month,
day:day
};

}

// اشتراک گذاری نتیجه

function shareResult(){


let result =
document.getElementById("result").innerText;



if(navigator.share){


navigator.share({

title:"محاسبه سن | کد پرتال",

text:result

});


}

else{


navigator.clipboard.writeText(result);


alert(
"✅ نتیجه کپی شد"
);


}


}





// حیوان سال تولد چینی

function chineseAnimal(year){


let animals=[

"موش 🐭",
"گاو 🐮",
"ببر 🐯",
"خرگوش 🐰",
"اژدها 🐉",
"مار 🐍",
"اسب 🐴",
"بز 🐐",
"میمون 🐵",
"خروس 🐔",
"سگ 🐶",
"خوک 🐷"

];


return animals[
(year-4)%12
];


}
function calculateShamsiAge(y,m,d,h,min){

let now = new Date(
new Date().toLocaleString("en-US",{
timeZone:"Asia/Tehran"
})
);


let today = jalaali.toJalaali(
now.getFullYear(),
now.getMonth()+1,
now.getDate()
);


let cy=today.jy;
let cm=today.jm;
let cd=today.jd;


let ch=now.getHours();
let cmin=now.getMinutes();


let years = cy-y;
let months = cm-m;
let days = cd-d;


let hours = ch-h;
let minutes = cmin-min;



if(minutes<0){

minutes+=60;
hours--;

}


if(hours<0){

hours+=24;
days--;

}


if(days<0){

months--;

cm--;

if(cm<=0){

cm=12;
cy--;

}

days += jalaali.jalaaliMonthLength(cy,cm);

}



if(months<0){

months+=12;
years--;

}



return {
years,
months,
days,
hours,
minutes
};

}

function calculateMiladiAge(y,m,d,h,min){

let now = new Date(
new Date().toLocaleString("en-US",{
timeZone:"Asia/Tehran"
})
);


let cy = now.getFullYear();
let cm = now.getMonth()+1;
let cd = now.getDate();

let ch = now.getHours();
let cmin = now.getMinutes();



let years = cy - y;
let months = cm - m;
let days = cd - d;

let hours = ch - h;
let minutes = cmin - min;



if(minutes < 0){

minutes += 60;
hours--;

}


if(hours < 0){

hours += 24;
days--;

}



if(days < 0){

months--;

let lastMonth = new Date(
cy,
cm-1,
0
).getDate();


days += lastMonth;

}



if(months < 0){

months += 12;
years--;

}



return {

years,
months,
days,
hours,
minutes

};


}

function calculateGhamariAge(y,m,d,h,min){

let now = new Date(
    new Date().toLocaleString("en-US",{
        timeZone:"Asia/Tehran"
    })
);


// تبدیل امروز به تاریخ قمری با الگوریتم داخلی
let today = gregorianToLunar(
    now.getFullYear(),
    now.getMonth()+1,
    now.getDate()
);


let cy = today.year;
let cm = today.month;
let cd = today.day;


let ch = now.getHours();
let cmin = now.getMinutes();


let years = cy - y;
let months = cm - m;
let days = cd - d;

let hours = ch - h;
let minutes = cmin - min;



if(minutes < 0){

    minutes += 60;
    hours--;

}


if(hours < 0){

    hours += 24;
    days--;

}



if(days < 0){

    months--;

    cm--;

    if(cm <= 0){

        cm = 12;
        cy--;

    }


    days += lunarMonthDays(cy,cm);

}



if(months < 0){

    months += 12;
    years--;

}



return {

years,
months,
days,
hours,
minutes

};

}
function lunarMonthDays(year, month){

// ماه‌های قمری یکی در میان 30 و 29 روزه تقریبی
let oddMonths = [1,3,5,7,9,11];

return oddMonths.includes(month) ? 30 : 29;

}



function gregorianToLunar(y,m,d){

let jd =
Math.floor((1461*(y+4800+Math.floor((m-14)/12)))/4)
+
Math.floor((367*(m-2-12*Math.floor((m-14)/12)))/12)
-
Math.floor((3*Math.floor((y+4900+Math.floor((m-14)/12))/100))/4)
+
d-32075;


let l = jd - 1948440 + 10632;

let n = Math.floor((l-1)/10631);

l = l - 10631*n + 354;

let j =
(Math.floor((10985-l)/5316)) *
(Math.floor((50*l)/17719))
+
(Math.floor(l/5670)) *
(Math.floor((43*l)/15238));


l =
l -
(Math.floor((30-j)/15)) *
(Math.floor((17719*j)/50))
-
(Math.floor(j/16)) *
(Math.floor((15238*j)/43))
+29;


let month =
Math.floor((24*l)/709);


let day =
l -
Math.floor((709*month)/24);


let year =
30*n+j-30;


return {
year:year,
month:month,
day:day
};

}
